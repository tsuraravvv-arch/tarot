<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タロット占い</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="screen title-screen">
      <img
        src="./assets/ui/title.png"
        alt="タロット占い"
        class="title-image"
      />

      <!-- 画像内の「1枚占い」ボタンに重ねる透明ボタン -->
      <button
        id="oneCardButton"
        class="hotspot hotspot-one"
        type="button"
        aria-label="1枚占いを始める"
      >
        1枚占い
      </button>

      <!-- 画像内の「3枚占い」ボタンに重ねる透明ボタン -->
      <button
        id="threeCardButton"
        class="hotspot hotspot-three"
        type="button"
        aria-label="3枚占いを始める"
      >
        3枚占い
      </button>
    </section>
  </main>

  <script>
    const oneCardButton = document.getElementById("oneCardButton");
    const threeCardButton = document.getElementById("threeCardButton");

    oneCardButton.addEventListener("click", () => {
      window.location.href = "./one.html";
    });

    threeCardButton.addEventListener("click", () => {
      alert("3枚占いは準備中です。まずは1枚占いで遊んでください。");
    });
  </script>
</body>
</html>
