<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タロット占い</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="app">
    <section class="screen title-screen">
      <img
        id="titleImage"
        src="./assets/ui/title.png"
        alt="タロット占い"
        class="title-image"
      />

      <!-- 画像内の「1枚占い」ボタンに重ねる透明ボタン -->
      <button
        id="oneCardButton"
        class="hotspot hotspot-one"
        type="button"
        aria-label="1枚占いを始める"
      >
        1枚占い
      </button>

      <!-- 画像内の「3枚占い」ボタンに重ねる透明ボタン -->
      <button
        id="threeCardButton"
        class="hotspot hotspot-three"
        type="button"
        aria-label="3枚占いを始める"
      >
        3枚占い
      </button>
    </section>
  </main>

<script>
  const titleImage = document.getElementById("titleImage");
  const oneCardButton = document.getElementById("oneCardButton");
  const threeCardButton = document.getElementById("threeCardButton");

  const titleBgm = new Audio("./assets/audio/title_bgm.mp3");
  titleBgm.loop = true;
  titleBgm.volume = 0.35;

  const transitionSound = new Audio("./assets/audio/button_click.mp3");
  transitionSound.volume = 0.8;

  let isMoving = false;

  function startTitleBgm() {
    titleBgm.play().catch(() => {
      // ブラウザの自動再生制限で失敗する場合があるため無視
    });
  }

  function playTransitionSound() {
    transitionSound.currentTime = 0;
    transitionSound.play().catch(() => {
      // 音声再生に失敗しても画面遷移は止めない
    });
  }

  function glowAndMove(url) {
    if (isMoving) return;
    isMoving = true;

    startTitleBgm();
    playTransitionSound();

    titleImage.src = "./assets/ui/title_glow.png";
    document.body.classList.add("is-transitioning");

    setTimeout(() => {
      window.location.href = url;
    }, 2500);
  }

  oneCardButton.addEventListener("click", () => {
    glowAndMove("./one.html");
  });

  threeCardButton.addEventListener("click", () => {
    if (isMoving) return;
    isMoving = true;

    startTitleBgm();
    playTransitionSound();

    titleImage.src = "./assets/ui/title_glow.png";
    document.body.classList.add("is-transitioning");

    setTimeout(() => {
      alert("3枚占いは準備中です。まずは1枚占いで遊んでください。");
      titleImage.src = "./assets/ui/title.png";
      document.body.classList.remove("is-transitioning");
      isMoving = false;
    }, 2500);
  });

  document.addEventListener("click", startTitleBgm, { once: true });
</script>
</body>
</html>
