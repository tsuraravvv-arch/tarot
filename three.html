<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3枚占い | タロット占い</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    .three-result-summary {
      position: relative;
      margin: 18px auto 30px;
      padding: 22px 16px 20px;
      max-width: 760px;
      border: 1px solid rgba(214, 176, 93, 0.42);
      border-radius: 26px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 232, 156, 0.22), transparent 38%),
        linear-gradient(180deg, rgba(25, 20, 42, 0.9), rgba(7, 8, 22, 0.88));
      box-shadow:
        0 0 34px rgba(214, 176, 93, 0.18),
        inset 0 0 24px rgba(255, 255, 255, 0.045);
      overflow: hidden;
    }

    .three-result-summary::before,
    .three-result-summary::after {
      content: "✦";
      position: absolute;
      color: rgba(255, 235, 170, 0.28);
      font-size: 54px;
      line-height: 1;
      pointer-events: none;
    }

    .three-result-summary::before {
      top: 12px;
      left: 18px;
    }

    .three-result-summary::after {
      right: 18px;
      bottom: 10px;
      transform: rotate(180deg);
    }

    .three-score-box {
      position: relative;
      z-index: 1;
      margin: 0 auto 18px;
      padding: 18px 20px;
      max-width: 460px;
      border: 1px solid rgba(214, 176, 93, 0.82);
      border-radius: 22px;
      background:
        radial-gradient(circle at center top, rgba(255, 239, 178, 0.16), transparent 54%),
        rgba(20, 14, 32, 0.78);
      box-shadow:
        0 0 24px rgba(214, 176, 93, 0.24),
        inset 0 0 16px rgba(255, 255, 255, 0.04);
      text-align: center;
    }

    .three-score-label {
      margin: 0 0 8px;
      color: #d9b96f;
      font-size: 0.98rem;
      letter-spacing: 0.16em;
    }

    .three-score-value {
      margin: 0;
      color: #fff4c8;
      font-size: clamp(3.4rem, 13vw, 5.5rem);
      font-weight: 700;
      line-height: 0.98;
      text-shadow: 0 0 18px rgba(255, 224, 140, 0.34);
    }

    .three-score-unit {
      font-size: clamp(1.25rem, 5vw, 2rem);
      margin-left: 4px;
    }

    .three-overall-comment-box {
      position: relative;
      z-index: 1;
      margin: 0 auto;
      padding: 18px 20px 20px;
      max-width: 680px;
      border: 1px solid rgba(214, 176, 93, 0.58);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 18px rgba(214, 176, 93, 0.13);
      color: #fff4c8;
      line-height: 1.9;
      text-align: left;
    }

    .three-overall-comment-title {
      margin: 0 0 10px;
      color: #d9b96f;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-align: center;
    }

    .three-overall-comment-text {
      margin: 0;
      font-size: clamp(0.98rem, 3.8vw, 1.08rem);
    }

    .result-fade-in {
      opacity: 0;
      transform: translateY(14px);
      animation: resultFadeIn 0.7s ease forwards;
    }

    @keyframes resultFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .share-result-card {
      position: relative;
      margin: 18px auto 26px;
      padding: 22px 18px 20px;
      width: min(100%, 760px);
      border: 1px solid rgba(214, 176, 93, 0.62);
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 232, 156, 0.24), transparent 36%),
        radial-gradient(circle at 12% 18%, rgba(92, 132, 220, 0.18), transparent 34%),
        linear-gradient(180deg, rgba(23, 18, 43, 0.96), rgba(5, 6, 18, 0.94));
      box-shadow:
        0 0 34px rgba(214, 176, 93, 0.2),
        inset 0 0 24px rgba(255, 255, 255, 0.045);
      overflow: hidden;
      text-align: center;
    }

    .share-result-card::before,
    .share-result-card::after {
      content: "✦";
      position: absolute;
      color: rgba(255, 235, 170, 0.22);
      font-size: 56px;
      line-height: 1;
      pointer-events: none;
    }

    .share-result-card::before {
      top: 14px;
      left: 18px;
    }

    .share-result-card::after {
      right: 18px;
      bottom: 14px;
      transform: rotate(180deg);
    }

    .share-card-brand,
    .share-card-score,
    .share-card-mini-list,
    .share-card-comment {
      position: relative;
      z-index: 1;
    }

    .share-card-brand {
      margin: 0 0 14px;
      color: #d9b96f;
      font-size: clamp(0.98rem, 3.8vw, 1.15rem);
      letter-spacing: 0.12em;
    }

    .share-card-score {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      gap: 8px;
      margin: 0 auto 18px;
      padding: 12px 24px 14px;
      min-width: 180px;
      border: 1px solid rgba(214, 176, 93, 0.78);
      border-radius: 999px;
      background: rgba(20, 14, 32, 0.72);
      box-shadow: 0 0 22px rgba(214, 176, 93, 0.22);
    }

    .share-card-score-label {
      color: #d9b96f;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      padding-bottom: 0.42em;
    }

    .share-card-score-value {
      color: #fff4c8;
      font-size: clamp(3.2rem, 12vw, 5rem);
      font-weight: 700;
      line-height: 0.9;
      text-shadow: 0 0 18px rgba(255, 224, 140, 0.34);
    }

    .share-card-score-unit {
      color: #fff4c8;
      font-size: clamp(1.1rem, 4vw, 1.55rem);
      padding-bottom: 0.32em;
    }

    .share-card-mini-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 0 auto 18px;
      max-width: 560px;
    }

    .share-card-mini-item {
      padding: 10px 8px 12px;
      border: 1px solid rgba(214, 176, 93, 0.34);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 0 14px rgba(255, 255, 255, 0.03);
      min-width: 0;
    }

    .share-card-mini-position {
      margin: 0 0 7px;
      color: #d9c17d;
      font-size: clamp(0.78rem, 3.2vw, 0.92rem);
      letter-spacing: 0.12em;
    }

    .share-card-mini-image {
      display: block;
      width: min(100%, 86px);
      margin: 0 auto 8px;
      border-radius: 8px;
      filter: drop-shadow(0 0 12px rgba(214, 179, 89, 0.22));
    }

    .share-card-mini-name {
      margin: 0;
      color: #f8efd4;
      font-size: clamp(0.72rem, 2.8vw, 0.9rem);
      line-height: 1.35;
      word-break: keep-all;
    }

    .share-card-mini-orientation {
      margin: 4px 0 0;
      color: rgba(248, 239, 212, 0.78);
      font-size: 0.76rem;
    }

    .share-card-comment {
      margin: 0 auto;
      max-width: 620px;
      padding: 14px 16px;
      border: 1px solid rgba(214, 176, 93, 0.42);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff4c8;
      font-size: clamp(0.95rem, 3.7vw, 1.06rem);
      line-height: 1.75;
      text-align: left;
    }

    .detail-result-title {
      margin: 28px 0 0;
      color: #d9b96f;
      font-size: 0.95rem;
      letter-spacing: 0.16em;
      text-align: center;
    }

    @media (max-width: 520px) {
      .share-result-card {
        padding: 20px 12px 18px;
        border-radius: 24px;
      }

      .share-card-mini-list {
        gap: 7px;
      }

      .share-card-mini-item {
        padding: 8px 5px 10px;
        border-radius: 14px;
      }

      .share-card-mini-image {
        width: min(100%, 68px);
      }
    }

  </style>
</head>
<body>
  <main class="app">
    <section id="threeDrawScreen" class="screen draw-screen three-draw-screen">
      <div class="one-page-header">
        <p class="small-title">大アルカナ占い</p>
        <h1>3枚占い</h1>
        <p>
          過去・現在・未来を表す3枚のカードを引きます。<br />
          気になる位置のカードから、順番に開いてください。
        </p>
      </div>

      <div class="three-card-board">
        <div class="three-card-slot">
          <p class="three-position-label">過去</p>
          <div class="three-card-button" role="button" tabindex="0" data-position="past" aria-label="過去のカードを引く">
            <div class="three-flip-card">
              <div class="three-flip-card-inner">
                <div class="three-flip-card-face three-flip-card-front">
                  <img src="./assets/cards/card_back.png" alt="カード裏面" />
                </div>
                <div class="three-flip-card-face three-flip-card-back">
                  <img src="./assets/cards/card_back.png" alt="" class="three-open-card-image" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="three-card-slot">
          <p class="three-position-label">現在</p>
          <div class="three-card-button" role="button" tabindex="0" data-position="present" aria-label="現在のカードを引く">
            <div class="three-flip-card">
              <div class="three-flip-card-inner">
                <div class="three-flip-card-face three-flip-card-front">
                  <img src="./assets/cards/card_back.png" alt="カード裏面" />
                </div>
                <div class="three-flip-card-face three-flip-card-back">
                  <img src="./assets/cards/card_back.png" alt="" class="three-open-card-image" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="three-card-slot">
          <p class="three-position-label">未来</p>
          <div class="three-card-button" role="button" tabindex="0" data-position="future" aria-label="未来のカードを引く">
            <div class="three-flip-card">
              <div class="three-flip-card-inner">
                <div class="three-flip-card-face three-flip-card-front">
                  <img src="./assets/cards/card_back.png" alt="カード裏面" />
                </div>
                <div class="three-flip-card-face three-flip-card-back">
                  <img src="./assets/cards/card_back.png" alt="" class="three-open-card-image" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <p id="threeDrawHint" class="three-draw-hint">3枚すべて開くと、結果が表示されます。</p>

      <button id="threeBackToTitleButton" class="sub-button" type="button">
        タイトルへ戻る
      </button>
    </section>

    <section id="threeResultScreen" class="screen result-screen three-result-screen hidden">
      <p class="result-label">3枚占いの結果</p>

      <div id="threeResultList" class="three-result-list"></div>

      <button id="threeShareXButton" class="share-button" type="button">
        Xで結果を共有
      </button>

      <button id="threeAgainButton" class="main-button" type="button">
        もう一度占う
      </button>

      <button id="threeResultBackButton" class="sub-button" type="button">
        タイトルへ戻る
      </button>
    </section>
  </main>

  <script>
    let cards = [];
    let cardsLoaded = false;
    let availableDeck = [];
    const drawn = {
      past: null,
      present: null,
      future: null
    };

    const mysticBgm = new Audio("./assets/audio/mystic_bgm.mp3");
    mysticBgm.loop = true;
    mysticBgm.volume = 0.35;

    const cardFlipSound = new Audio("./assets/audio/card_flip.mp3");
    cardFlipSound.volume = 0.85;

    const threeDrawScreen = document.getElementById("threeDrawScreen");
    const threeResultScreen = document.getElementById("threeResultScreen");
    const threeResultList = document.getElementById("threeResultList");

    const threeCardButtons = Array.from(document.querySelectorAll(".three-card-button"));
    const threeBackToTitleButton = document.getElementById("threeBackToTitleButton");
    const threeAgainButton = document.getElementById("threeAgainButton");
    const threeShareXButton = document.getElementById("threeShareXButton");
    const threeResultBackButton = document.getElementById("threeResultBackButton");

    const positionMeta = {
      past: {
        label: "過去",
        icon: "./assets/icons/icon_past.png"
      },
      present: {
        label: "現在",
        icon: "./assets/icons/icon_present.png"
      },
      future: {
        label: "未来",
        icon: "./assets/icons/icon_future.png"
      }
    };

    const scoreTable = {
      0: { up: [70, 76, 82], rev: [45, 42, 58] },
      1: { up: [75, 84, 88], rev: [48, 44, 66] },
      2: { up: [68, 72, 78], rev: [46, 43, 62] },
      3: { up: [82, 88, 90], rev: [50, 47, 68] },
      4: { up: [74, 78, 84], rev: [45, 42, 63] },
      5: { up: [72, 76, 80], rev: [48, 45, 64] },
      6: { up: [76, 82, 86], rev: [44, 42, 66] },
      7: { up: [76, 84, 88], rev: [43, 40, 62] },
      8: { up: [74, 78, 84], rev: [46, 44, 66] },
      9: { up: [66, 68, 75], rev: [42, 39, 60] },
      10: { up: [72, 80, 82], rev: [44, 42, 64] },
      11: { up: [70, 72, 78], rev: [43, 40, 62] },
      12: { up: [55, 52, 68], rev: [38, 36, 58] },
      13: { up: [52, 50, 72], rev: [36, 34, 62] },
      14: { up: [78, 84, 86], rev: [44, 42, 66] },
      15: { up: [38, 35, 56], rev: [30, 28, 54] },
      16: { up: [32, 28, 50], rev: [34, 32, 48] },
      17: { up: [76, 82, 88], rev: [44, 42, 66] },
      18: { up: [42, 38, 58], rev: [34, 32, 56] },
      19: { up: [88, 94, 96], rev: [50, 48, 70] },
      20: { up: [72, 80, 86], rev: [44, 42, 64] },
      21: { up: [86, 90, 94], rev: [46, 44, 72] }
    };

    const flowTable = {
      0: { up: "growth", rev: "warning" },
      1: { up: "growth", rev: "blocked" },
      2: { up: "stable", rev: "confusion" },
      3: { up: "positive", rev: "blocked" },
      4: { up: "stable", rev: "warning" },
      5: { up: "stable", rev: "confusion" },
      6: { up: "growth", rev: "confusion" },
      7: { up: "growth", rev: "blocked" },
      8: { up: "growth", rev: "blocked" },
      9: { up: "stable", rev: "blocked" },
      10: { up: "change", rev: "blocked" },
      11: { up: "stable", rev: "warning" },
      12: { up: "blocked", rev: "blocked" },
      13: { up: "change", rev: "blocked" },
      14: { up: "stable", rev: "blocked" },
      15: { up: "warning", rev: "blocked" },
      16: { up: "change", rev: "blocked" },
      17: { up: "hope", rev: "confusion" },
      18: { up: "confusion", rev: "confusion" },
      19: { up: "positive", rev: "blocked" },
      20: { up: "growth", rev: "blocked" },
      21: { up: "positive", rev: "blocked" }
    };

    const flowComments = {
      positive: "全体的に明るい流れです。これまでの積み重ねが、前向きな結果につながっていきそうです。今の方向性を信じて進んでよさそうです。",
      stable: "大きく崩れる流れではなさそうです。焦って変えようとするより、今あるものを丁寧に整えることで、良い結果につながりそうです。",
      growth: "成長や前進の流れがあります。少し勇気を出して動くことで、状況が広がっていきそうです。小さな一歩を大切にしてみてください。",
      change: "変化の流れが強く出ています。今までのやり方にこだわりすぎず、流れに合わせて選び直すことが大切になりそうです。",
      warning: "少し注意が必要です。焦って決めるより、状況をよく見てから動くほうがよさそうです。無理をしすぎないことがポイントです。",
      confusion: "迷いや不安が出やすい流れです。すぐに答えを出そうとせず、気持ちを整理する時間を持つとよさそうです。",
      blocked: "今は少し停滞しやすい流れです。無理に進めるより、原因を見直すことが大切です。整えることで次の流れが見えてきそうです。",
      hope: "希望のある流れです。すぐに結果が出なくても、前向きな兆しは見えています。あきらめずに続けることで道が開けそうです。"
    };

    const positionScoreIndex = {
      past: 0,
      present: 1,
      future: 2
    };

    function getCardScore(item, position) {
      const cardNumber = Number(item.card.id);
      const data = scoreTable[cardNumber];

      if (!data) return 0;

      const scoreList = item.reversed ? data.rev : data.up;
      return scoreList[positionScoreIndex[position]];
    }

    function getTotalScore() {
      const pastScore = getCardScore(drawn.past, "past");
      const presentScore = getCardScore(drawn.present, "present");
      const futureScore = getCardScore(drawn.future, "future");

      return Math.round(
        pastScore * 0.2 +
        presentScore * 0.4 +
        futureScore * 0.4
      );
    }

    function getFlowType(item) {
      const cardNumber = Number(item.card.id);
      const data = flowTable[cardNumber];

      if (!data) return "stable";

      return item.reversed ? data.rev : data.up;
    }

    function getOverallComment() {
      const futureFlow = getFlowType(drawn.future);
      return flowComments[futureFlow] || flowComments.stable;
    }

    function startMysticBgm() {
      mysticBgm.play().catch(() => {});
    }

    function playCardFlipSound() {
      cardFlipSound.currentTime = 0;
      cardFlipSound.play().catch(() => {});
    }

    window.addEventListener("DOMContentLoaded", () => {
      const shouldStartBgm = sessionStorage.getItem("startMysticBgm");

      if (shouldStartBgm === "true") {
        sessionStorage.removeItem("startMysticBgm");
        mysticBgm.play().catch(() => {});
      }
    });

    document.addEventListener("click", startMysticBgm, { once: true });

    async function loadCards() {
      try {
        const response = await fetch("./cards.json");

        if (!response.ok) {
          throw new Error("cards.json を読み込めませんでした。");
        }

        cards = await response.json();
        cardsLoaded = true;
        resetDeck();
      } catch (error) {
        console.error(error);
        alert("カードデータの読み込みに失敗しました。cards.json の配置を確認してください。");
      }
    }

    function resetDeck() {
      availableDeck = [...cards];
    }

    function drawCardFromDeck() {
      const index = Math.floor(Math.random() * availableDeck.length);
      const card = availableDeck.splice(index, 1)[0];
      const reversed = Math.random() < 0.5;

      return {
        card,
        reversed
      };
    }

    function openThreeCard(button) {
      if (!cardsLoaded || !availableDeck.length) {
        alert("カードデータを読み込み中です。少し待ってからもう一度押してください。");
        return;
      }

      const position = button.dataset.position;

      if (drawn[position]) return;

      startMysticBgm();
      button.classList.add("is-shuffling");

      setTimeout(() => {
        const result = drawCardFromDeck();
        drawn[position] = result;

        const cardImage = button.querySelector(".three-open-card-image");
        const flipCard = button.querySelector(".three-flip-card");

        const imagePath = `./assets/cards/${result.card.image}`;

        cardImage.src = imagePath;
        cardImage.alt = `${positionMeta[position].label} ${result.card.name_ja} / ${result.card.name_en}`;
        cardImage.classList.toggle("is-reversed-image", result.reversed);

        button.classList.remove("is-shuffling");
        playCardFlipSound();
        flipCard.classList.add("is-flipped");
        button.classList.add("is-opened");

        if (drawn.past && drawn.present && drawn.future) {
          setTimeout(() => {
            showThreeResult();
          }, 1200);
        }
      }, 850);
    }

    function showThreeResult() {
      renderThreeResult();

      threeDrawScreen.classList.add("hidden");
      threeResultScreen.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderThreeResult() {
      const order = ["past", "present", "future"];
      const totalScore = getTotalScore();
      const overallComment = getOverallComment();

      const shareCardItemsHtml = order.map((position) => {
        const item = drawn[position];
        const card = item.card;
        const orientationLabel = item.reversed ? "逆位置" : "正位置";
        const imageClass = item.reversed ? "share-card-mini-image is-reversed-image" : "share-card-mini-image";

        return `
          <div class="share-card-mini-item">
            <p class="share-card-mini-position">${positionMeta[position].label}</p>
            <img src="./assets/cards/${card.image}" alt="${card.name_ja} / ${card.name_en}" class="${imageClass}" />
            <p class="share-card-mini-name">${card.name_en}</p>
            <p class="share-card-mini-orientation">${orientationLabel}</p>
          </div>
        `;
      }).join("");

      const scoreHtml = `
        <div class="share-result-card result-fade-in" style="animation-delay: 0.05s;">
          <p class="share-card-brand">氷洞つららのタロット占い</p>
          <div class="share-card-score" aria-label="総合運 ${totalScore}点">
            <span class="share-card-score-label">総合運</span>
            <span class="share-card-score-value">${totalScore}</span>
            <span class="share-card-score-unit">点</span>
          </div>
          <div class="share-card-mini-list">
            ${shareCardItemsHtml}
          </div>
          <p class="share-card-comment">${escapeHtml(overallComment)}</p>
        </div>
        <p class="detail-result-title result-fade-in" style="animation-delay: 0.14s;">カード別メッセージ</p>
      `;

      const cardHtml = order.map((position, index) => {
        const item = drawn[position];
        const card = item.card;
        const orientationKey = item.reversed ? "reversed" : "upright";
        const orientationLabel = item.reversed ? "逆位置" : "正位置";
        const keywords = item.reversed && card.keywords_reversed
          ? card.keywords_reversed
          : card.keywords;
        const message = card.three_card?.[position]?.[orientationKey] || card.messages?.general || card.message_daily;
        const imageClass = item.reversed ? "three-result-card-image is-reversed-image" : "three-result-card-image";

        return `
          <section class="three-result-card result-fade-in" style="animation-delay: ${0.18 + index * 0.12}s;">
            <div class="three-result-heading">
              <img src="${positionMeta[position].icon}" alt="" class="three-position-icon" />
              <div>
                <p class="three-result-position">${positionMeta[position].label}</p>
                <p class="three-result-orientation">${orientationLabel}</p>
              </div>
            </div>

            <div class="three-result-body">
              <img
                src="./assets/cards/${card.image}"
                alt="${card.name_ja} / ${card.name_en}"
                class="${imageClass}"
              />

              <div class="three-result-text">
                <p class="result-card-number three-number">${card.number}</p>
                <h2 class="result-card-title three-title">${card.name_en} / ${card.name_ja}</h2>
                <p class="keywords">${keywords.join("・")}</p>
                <p class="three-message">${escapeHtml(message).replace(/\n/g, "<br>")}</p>
              </div>
            </div>
          </section>
        `;
      }).join("");

      threeResultList.innerHTML = scoreHtml + cardHtml;
    }

    function getShareUrl() {
      return window.location.origin + window.location.pathname.replace(/\/[^/]*$/, "/");
    }

    function shareThreeCardsToX() {
      if (!drawn.past || !drawn.present || !drawn.future) return;

      const order = ["past", "present", "future"];
      const resultLines = order.map((position) => {
        const item = drawn[position];
        const card = item.card;
        const orientationLabel = item.reversed ? "逆" : "正";
        return `${positionMeta[position].label} ${card.name_en}（${orientationLabel}）`;
      });

      const totalScore = getTotalScore();

      const text = [
        "🔮氷洞つららのタロット占い",
        `総合運 ${totalScore}点`,
        ...resultLines,
        "占ってみる"
      ].join("\n");

      const shareUrl = new URL("https://twitter.com/intent/tweet");
      shareUrl.searchParams.set("text", text);
      shareUrl.searchParams.set("url", getShareUrl());

      window.open(shareUrl.toString(), "_blank", "noopener,noreferrer");
    }

    function resetThreeReading() {
      drawn.past = null;
      drawn.present = null;
      drawn.future = null;
      resetDeck();

      threeResultList.innerHTML = "";
      threeResultScreen.classList.add("hidden");
      threeDrawScreen.classList.remove("hidden");

      threeCardButtons.forEach((button) => {
        button.classList.remove("is-opened");
        button.classList.remove("is-shuffling");

        const flipCard = button.querySelector(".three-flip-card");
        const cardImage = button.querySelector(".three-open-card-image");

        flipCard.classList.remove("is-flipped");
        cardImage.src = "./assets/cards/card_back.png";
        cardImage.alt = "";
        cardImage.classList.remove("is-reversed-image");
      });

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    threeCardButtons.forEach((button) => {
      button.addEventListener("click", () => {
        openThreeCard(button);
      });

      button.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openThreeCard(button);
        }
      });
    });

    threeShareXButton.addEventListener("click", () => {
      shareThreeCardsToX();
    });

    threeAgainButton.addEventListener("click", () => {
      resetThreeReading();
    });

    threeBackToTitleButton.addEventListener("click", () => {
      window.location.href = "./index.html";
    });

    threeResultBackButton.addEventListener("click", () => {
      window.location.href = "./index.html";
    });

    loadCards();
  </script>
</body>
</html>
