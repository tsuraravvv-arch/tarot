<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1枚占い | タロット占い</title>
  <link rel="stylesheet" href="./style.css" />

  <style>
    .one-share-result-card {
      position: relative;
      margin: 18px auto 28px;
      padding: 22px 18px 20px;
      width: min(100%, 720px);
      border: 1px solid rgba(214, 176, 93, 0.62);
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 232, 156, 0.24), transparent 36%),
        radial-gradient(circle at 12% 18%, rgba(92, 132, 220, 0.18), transparent 34%),
        linear-gradient(180deg, rgba(23, 18, 43, 0.96), rgba(5, 6, 18, 0.94));
      box-shadow:
        0 0 34px rgba(214, 176, 93, 0.2),
        inset 0 0 24px rgba(255, 255, 255, 0.045);
      overflow: hidden;
      text-align: center;
    }

    .one-share-result-card::before,
    .one-share-result-card::after {
      content: "✦";
      position: absolute;
      color: rgba(255, 235, 170, 0.22);
      font-size: 56px;
      line-height: 1;
      pointer-events: none;
    }

    .one-share-result-card::before {
      top: 14px;
      left: 18px;
    }

    .one-share-result-card::after {
      right: 18px;
      bottom: 14px;
      transform: rotate(180deg);
    }

    .one-share-brand,
    .one-share-card-main,
    .one-share-comment {
      position: relative;
      z-index: 1;
    }

    .one-share-brand {
      margin: 0 0 16px;
      color: #d9b96f;
      font-size: clamp(0.98rem, 3.8vw, 1.15rem);
      letter-spacing: 0.12em;
    }

    .one-share-card-main {
      display: grid;
      grid-template-columns: minmax(120px, 190px) 1fr;
      gap: 18px;
      align-items: center;
      max-width: 560px;
      margin: 0 auto 18px;
      text-align: left;
    }

    .one-share-card-image {
      width: 100%;
      max-width: 190px;
      border-radius: 12px;
      filter: drop-shadow(0 0 18px rgba(214, 179, 89, 0.25));
    }

    .one-share-label {
      margin: 0 0 8px;
      color: #d9c17d;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
    }

    .one-share-number {
      margin: 0 0 6px;
      color: #fff4c8;
      font-size: clamp(2rem, 7vw, 3.6rem);
      line-height: 1;
      letter-spacing: 0.14em;
      text-shadow: 0 0 18px rgba(255, 224, 140, 0.28);
    }

    .one-share-name {
      margin: 0 0 8px;
      color: #f8efd4;
      font-size: clamp(1.15rem, 4.6vw, 1.8rem);
      line-height: 1.35;
      letter-spacing: 0.05em;
    }

    .one-share-keywords {
      margin: 0;
      color: rgba(248, 239, 212, 0.82);
      font-size: clamp(0.9rem, 3.6vw, 1.02rem);
      line-height: 1.65;
    }

    .one-share-comment {
      margin: 0 auto;
      max-width: 620px;
      padding: 14px 16px;
      border: 1px solid rgba(214, 176, 93, 0.42);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.06);
      color: #fff4c8;
      font-size: clamp(0.95rem, 3.7vw, 1.06rem);
      line-height: 1.75;
      text-align: left;
    }

    .one-detail-result-title {
      margin: 30px 0 0;
      color: #d9b96f;
      font-size: 0.95rem;
      letter-spacing: 0.16em;
      text-align: center;
    }

    .result-fade-in {
      opacity: 0;
      transform: translateY(14px);
      animation: resultFadeIn 0.7s ease forwards;
    }

    @keyframes resultFadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 560px) {
      .one-share-result-card {
        padding: 20px 13px 18px;
        border-radius: 24px;
      }

      .one-share-card-main {
        grid-template-columns: 34% 1fr;
        gap: 12px;
      }

      .one-share-card-image {
        border-radius: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="drawScreen" class="screen draw-screen">
      <div class="one-page-header">
        <p class="small-title">大アルカナ占い</p>
        <h1>1枚占い</h1>
        <p>
          心の中で質問を思い浮かべてください。<br />
          準備ができたら、カードを引いてください。
        </p>
      </div>

      <div
        id="drawButton"
        class="card-back-button flip-card-button"
        role="button"
        tabindex="0"
        aria-label="カードを引く"
      >
        <div id="flipCard" class="flip-card">
          <div class="flip-card-inner">
            <div class="flip-card-face flip-card-front">
              <img
                src="./assets/cards/card_back.png"
                alt="カード裏面"
                class="card-back"
              />
            </div>

            <div class="flip-card-face flip-card-back">
              <img
                id="previewCardImage"
                src="./assets/cards/card_back.png"
                alt=""
                class="card-back"
              />
            </div>
          </div>
        </div>
      </div>

      <button id="backToTitleButton" class="sub-button" type="button">
        タイトルへ戻る
      </button>
    </section>

    <section id="resultScreen" class="screen result-screen hidden">
      <p class="result-label">1枚占いの結果</p>

      <div id="oneShareResultCard" class="one-share-result-card result-fade-in">
        <div class="one-share-card-main">
          <img
            id="resultCardImage"
            src=""
            alt=""
            class="one-share-card-image"
          />
          <div>
            <p class="one-share-label">今日のカード</p>
            <p id="resultCardNumber" class="one-share-number"></p>
            <h2 id="resultCardName" class="one-share-name"></h2>
            <p id="resultKeywords" class="one-share-keywords"></p>
          </div>
        </div>
        <p id="oneShareComment" class="one-share-comment"></p>
      </div>

      <div class="result-action-buttons share-tools-inline">
        <button id="saveImageButton" class="result-action-button" type="button">
          画像として保存
        </button>
        <button id="copyImageButton" class="result-action-button" type="button">
          画像をコピー
        </button>
        <button id="shareXButton" class="share-button" type="button">
          Xに投稿
        </button>
      </div>
      <p class="share-help-text">画像付きで投稿したい場合は、先に画像を保存またはコピーしてからXに添付してください。</p>
      <div id="toastMessage" class="toast-message" aria-live="polite"></div>

      <p class="one-detail-result-title">くわしいメッセージ</p>
      <div id="categoryMessages" class="category-messages result-fade-in"></div>

      <button id="againButton" class="main-button" type="button">
        もう一度占う
      </button>

      <button id="resultBackButton" class="sub-button" type="button">
        タイトルへ戻る
      </button>
    </section>
  </main>

  <script>
    let cards = [];
    let isDrawing = false;
    let cardsLoaded = false;
    let currentCard = null;

    const mysticBgm = new Audio("./assets/audio/mystic_bgm.mp3");
    mysticBgm.loop = true;
    mysticBgm.volume = 0.35;

    const cardFlipSound = new Audio("./assets/audio/card_flip.mp3");
    cardFlipSound.volume = 0.85;

    const drawScreen = document.getElementById("drawScreen");
    const resultScreen = document.getElementById("resultScreen");

    const drawButton = document.getElementById("drawButton");
    const backToTitleButton = document.getElementById("backToTitleButton");
    const againButton = document.getElementById("againButton");
    const shareXButton = document.getElementById("shareXButton");
    const saveImageButton = document.getElementById("saveImageButton");
    const copyImageButton = document.getElementById("copyImageButton");
    const toastMessage = document.getElementById("toastMessage");
    const resultBackButton = document.getElementById("resultBackButton");

    const resultCardImage = document.getElementById("resultCardImage");
    const resultCardNumber = document.getElementById("resultCardNumber");
    const resultCardName = document.getElementById("resultCardName");
    const resultKeywords = document.getElementById("resultKeywords");
    const oneShareComment = document.getElementById("oneShareComment");
    const categoryMessages = document.getElementById("categoryMessages");

    const flipCard = document.getElementById("flipCard");
    const previewCardImage = document.getElementById("previewCardImage");

    function startMysticBgm() {
      mysticBgm.play().catch(() => {});
    }

    function playCardFlipSound() {
      cardFlipSound.currentTime = 0;
      cardFlipSound.play().catch(() => {});
    }

    window.addEventListener("DOMContentLoaded", () => {
      const shouldStartBgm = sessionStorage.getItem("startMysticBgm");

      if (shouldStartBgm === "true") {
        sessionStorage.removeItem("startMysticBgm");
        mysticBgm.play().catch(() => {});
      }
    });

    document.addEventListener("click", startMysticBgm, { once: true });

    async function loadCards() {
      try {
        const response = await fetch("./cards.json");

        if (!response.ok) {
          throw new Error("cards.json を読み込めませんでした。");
        }

        cards = await response.json();
        cardsLoaded = true;

        console.log("cards loaded:", cards.length);
      } catch (error) {
        console.error(error);
        alert("カードデータの読み込みに失敗しました。cards.json の配置を確認してください。");
      }
    }

    function showDrawScreen() {
      isDrawing = false;
      currentCard = null;

      resultScreen.classList.add("hidden");
      drawScreen.classList.remove("hidden");

      drawButton.classList.remove("is-shuffling");

      if (flipCard) {
        flipCard.classList.remove("is-flipped");
      }

      if (previewCardImage) {
        previewCardImage.src = "./assets/cards/card_back.png";
        previewCardImage.alt = "";
      }

      categoryMessages.innerHTML = "";
      oneShareComment.textContent = "";

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showResultScreen() {
      drawScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function drawOneCard() {
      console.log("draw clicked");

      startMysticBgm();

      if (!cardsLoaded || !cards.length) {
        alert("カードデータを読み込み中です。少し待ってからもう一度押してください。");
        return;
      }

      if (isDrawing) {
        return;
      }

      isDrawing = true;

      const index = Math.floor(Math.random() * cards.length);
      const card = cards[index];
      currentCard = card;

      const imagePath = `./assets/cards/${card.image}`;

      previewCardImage.src = imagePath;
      previewCardImage.alt = `${card.name_ja} / ${card.name_en}`;

      resultCardImage.src = imagePath;
      resultCardImage.alt = `${card.name_ja} / ${card.name_en}`;

      resultCardNumber.textContent = card.number;
      resultCardName.textContent = `${card.name_en} / ${card.name_ja}`;
      resultKeywords.textContent = Array.isArray(card.keywords)
        ? card.keywords.join("・")
        : "";

      oneShareComment.textContent = getOneShareComment(card);
      renderCategoryMessages(card);

      drawButton.classList.add("is-shuffling");

      setTimeout(() => {
        drawButton.classList.remove("is-shuffling");
        playCardFlipSound();
        flipCard.classList.add("is-flipped");

        setTimeout(() => {
          showResultScreen();
        }, 1200);
      }, 950);
    }

    function getOneShareComment(card) {
      const messages = card.messages || {};
      return messages.general || "このカードが、今のあなたへのヒントになりそうです。";
    }

    function renderCategoryMessages(card) {
      const messages = card.messages || {};

      const sections = [
        {
          key: "general",
          title: "全般",
          icon: "./assets/icons/icon_general.png"
        },
        {
          key: "love",
          title: "恋愛",
          icon: "./assets/icons/icon_love.png"
        },
        {
          key: "work",
          title: "仕事・勉強",
          icon: "./assets/icons/icon_work.png"
        },
        {
          key: "health",
          title: "健康",
          icon: "./assets/icons/icon_health.png"
        },
        {
          key: "point",
          title: "ワンポイント",
          icon: "./assets/icons/icon_point.png"
        }
      ];

      categoryMessages.innerHTML = sections
        .map((section) => {
          const text = messages[section.key] || "";

          if (!text) return "";

          return `
            <section class="category-card">
              <div class="category-heading">
                <img
                  src="${section.icon}"
                  alt=""
                  class="category-icon"
                />
                <h3>${section.title}</h3>
              </div>
              <p>${escapeHtml(text).replace(/\n/g, "<br>")}</p>
            </section>
          `;
        })
        .join("");
    }

    function getShareUrl() {
      return window.location.origin + window.location.pathname.replace(/\/[^/]*$/, "/");
    }


    function showToast(message) {
      if (!toastMessage) {
        alert(message);
        return;
      }
      toastMessage.textContent = message;
      toastMessage.classList.add("is-visible");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toastMessage.classList.remove("is-visible");
      }, 1800);
    }

    function loadImageForCanvas(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function drawRoundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    const canvasFontFamily = '"Noto Serif JP", "Yu Mincho", "Hiragino Mincho ProN", "Times New Roman", serif';

    function setCanvasFont(ctx, size, weight = "400") {
      ctx.font = `${weight} ${size}px ${canvasFontFamily}`;
    }

    function fitCanvasFont(ctx, text, maxWidth, startSize, minSize = 18, weight = "400") {
      let size = startSize;
      const safeText = String(text || "");
      while (size > minSize) {
        setCanvasFont(ctx, size, weight);
        if (ctx.measureText(safeText).width <= maxWidth) break;
        size -= 2;
      }
      return size;
    }

    function fillTextFit(ctx, text, x, y, maxWidth, startSize, minSize = 18, weight = "400") {
      fitCanvasFont(ctx, text, maxWidth, startSize, minSize, weight);
      ctx.fillText(String(text || ""), x, y);
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 3) {
      const chars = String(text || "").split("");
      const lines = [];
      let line = "";
      for (const ch of chars) {
        const test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = ch;
          if (lines.length >= maxLines - 1) break;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      lines.slice(0, maxLines).forEach((lineText, index) => {
        ctx.fillText(lineText, x, y + index * lineHeight);
      });
    }

    async function renderResultCardToCanvas() {
      if (!currentCard) {
        throw new Error("占い結果がありません。");
      }

      if (document.fonts && document.fonts.ready) {
        await document.fonts.ready;
      }

      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 720;
      const ctx = canvas.getContext("2d");

      const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bg.addColorStop(0, "#202044");
      bg.addColorStop(0.55, "#111225");
      bg.addColorStop(1, "#090b18");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      drawRoundRect(ctx, 32, 32, canvas.width - 64, canvas.height - 64, 48);
      ctx.strokeStyle = "#b99945";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();

      const img = await loadImageForCanvas(`./assets/cards/${currentCard.image}`);
      const cardX = 110;
      const cardY = 120;
      const cardW = 285;
      const cardH = 428;
      ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
      ctx.shadowBlur = 18;
      ctx.drawImage(img, cardX, cardY, cardW, cardH);
      ctx.shadowBlur = 0;

      ctx.textAlign = "left";
      ctx.fillStyle = "#fff8d8";
      setCanvasFont(ctx, 28);
      ctx.fillText("今日のカード", 445, 165);

      ctx.fillStyle = "#ffffff";
      fillTextFit(ctx, `${currentCard.number} ${currentCard.name_en}`, 445, 245, 545, 42, 26);

      ctx.fillStyle = "#d8d1bd";
      setCanvasFont(ctx, 28);
      ctx.fillText(currentCard.name_ja, 445, 305);

      ctx.fillStyle = "#d9bf70";
      fillTextFit(ctx, (currentCard.keywords || []).join("・"), 445, 360, 545, 26, 18);

      ctx.fillStyle = "rgba(8, 10, 24, 0.58)";
      drawRoundRect(ctx, 420, 415, 550, 165, 28);
      ctx.fill();
      ctx.strokeStyle = "rgba(185, 153, 69, 0.85)";
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.fillStyle = "#fff8d8";
      setCanvasFont(ctx, 28);
      wrapCanvasText(ctx, currentCard.messages?.general || currentCard.message_daily || "", 455, 470, 485, 42, 3);

      ctx.fillStyle = "rgba(255, 248, 216, 0.75)";
      setCanvasFont(ctx, 23);
      ctx.textAlign = "center";
      ctx.fillText("大アルカナ占い", canvas.width / 2, 650);

      return canvas;
    }

    async function saveOneResultImage() {
      try {
        const canvas = await renderResultCardToCanvas();
        const link = document.createElement("a");
        link.download = "tsurara-tarot-one-result.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
        showToast("画像を保存しました");
      } catch (error) {
        console.error(error);
        showToast("画像保存に失敗しました");
      }
    }

    async function copyOneResultImage() {
      try {
        if (!navigator.clipboard || typeof ClipboardItem === "undefined") {
          showToast("このブラウザは画像コピーに対応していません");
          return;
        }

        const canvas = await renderResultCardToCanvas();
        canvas.toBlob(async (blob) => {
          if (!blob) {
            showToast("画像コピーに失敗しました");
            return;
          }
          await navigator.clipboard.write([
            new ClipboardItem({ "image/png": blob })
          ]);
          showToast("画像をコピーしました");
        }, "image/png");
      } catch (error) {
        console.error(error);
        showToast("画像コピーに失敗しました");
      }
    }

    function getOneResultShareText() {
      if (!currentCard) return "";

      return [
        `今日のカード：${currentCard.number} ${currentCard.name_en}`,
        "",
        "占ってみる？",
        "氷洞つららのタロット占い",
        getShareUrl()
      ].join("\n");
    }

    async function copyOneResultText() {
      const text = getOneResultShareText();
      if (!text) return;

      try {
        await navigator.clipboard.writeText(text);
        showToast("テキストをコピーしました");
      } catch (error) {
        console.error(error);
        showToast("コピーに失敗しました");
      }
    }

    function shareOneCardToX() {
      if (!currentCard) return;

      const text = [
        `今日のカード：${currentCard.number} ${currentCard.name_en}`,
        "",
        "占ってみる？",
        "氷洞つららのタロット占い"
      ].join("\n");

      const shareUrl = new URL("https://twitter.com/intent/tweet");
      shareUrl.searchParams.set("text", text);
      shareUrl.searchParams.set("url", getShareUrl());

      window.open(shareUrl.toString(), "_blank", "noopener,noreferrer");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    drawButton.addEventListener("click", () => {
      console.log("カードがクリックされました");
      drawOneCard();
    });

    drawButton.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        drawOneCard();
      }
    });

    saveImageButton.addEventListener("click", () => {
      saveOneResultImage();
    });

    copyImageButton.addEventListener("click", () => {
      copyOneResultImage();
    });

    shareXButton.addEventListener("click", () => {
      shareOneCardToX();
    });

    againButton.addEventListener("click", () => {
      showDrawScreen();
    });

    backToTitleButton.addEventListener("click", () => {
      window.location.href = "./index.html";
    });

    resultBackButton.addEventListener("click", () => {
      window.location.href = "./index.html";
    });

    loadCards();
  </script>
</body>
</html>
